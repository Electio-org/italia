name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    name: Bundle and frontend smoke checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Python syntax
        run: python -m py_compile scripts/*.py clients/python/lce_loader.py

      - name: JavaScript syntax
        run: node --check app.js && node --check site-pages.js && find modules -name "*.js" -print0 | xargs -0 -n1 node --check

      - name: Performance asset smoke test
        run: python scripts/smoke_performance_assets.py --root .

      - name: Bundle integrity
        run: python scripts/check_bundle.py --root .
